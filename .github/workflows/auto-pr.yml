name: Auto PR & Merge

on:
  push:
    branches:
      - 'ai-patch-**'
      - 'ai-fix-**'
      - 'ai-feat-**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    name: Create PR and Auto Merge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get branch info
        id: branch
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          MSG=$(git log -1 --pretty=%s)
          echo "msg=$MSG" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: cpr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = '${{ steps.branch.outputs.branch }}';
            const msg = '${{ steps.branch.outputs.msg }}';
            const body = [
              '## 변경 내용',
              msg,
              '',
              '## 변경 이유',
              'AI(안티그래비티)에 의한 자동 변경 사항',
              '',
              '## 변경 범위',
              '브랜치: ' + branch,
              '',
              '## 롤백',
              '해당 브랜치 커밋 되돌리기',
              '',
              '## 금지영역 수정 사유',
              'AI 자동 작업으로 인한 설정 파일 수정 시 자동 포함'
            ].join('\n');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: context.repo.owner + ':' + branch,
              base: 'master',
              state: 'open'
            });
            if (prs.length > 0) {
              core.setOutput('pr_number', prs[0].number);
              return;
            }
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: msg || 'Auto PR from ' + branch,
              body: body,
              head: branch,
              base: 'master'
            });
            core.setOutput('pr_number', pr.number);

      - name: Wait for checks and Auto Merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = parseInt('${{ steps.cpr.outputs.pr_number }}');
            if (!pr_number) return;
            for (let i = 0; i < 20; i++) {
              await new Promise(r => setTimeout(r, 30000));
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number
              });
              if (pr.state === 'closed') return;
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha
              });
              const runs = checks.check_runs.filter(r => r.name !== 'Create PR and Auto Merge');
              const allDone = runs.length > 0 && runs.every(r => r.status === 'completed');
              const allPassed = runs.every(r => r.conclusion === 'success');
              if (allDone && allPassed) {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr_number,
                  merge_method: 'squash'
                });
                return;
              }
              if (allDone && !allPassed) return;
            }
