name: PR Guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR description & restricted files
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || "").toLowerCase();

            const requiredSections = [
              "변경 내용",
              "변경 이유",
              "변경 범위",
              "롤백"
            ];

            const missing = requiredSections.filter(s => !body.includes(s.toLowerCase()));

            if (missing.length) {
              core.setFailed(`PR 본문에 필수 섹션이 없습니다: ${missing.join(", ")}`);
              return;
            }

            const restricted = [
              "firestore.rules",
              "firestore.indexes.json",
              "firebase.json",
              ".github/workflows/",
              "functions/package.json",
              "package.json"
            ];

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, per_page: 100 }
            );

            const changed = files.map(f => f.filename);

            const hit = changed.filter(path =>
              restricted.some(r => r.endsWith("/") ? path.startsWith(r) : path === r)
            );

            if (hit.length) {

              const allowKeyword = "금지영역 수정 사유";

              if (!body.includes(allowKeyword.toLowerCase())) {
                core.setFailed(
                  `주의 파일 수정 감지:\n${hit.join("\n")}\n\nPR 본문에 "${allowKeyword}" 작성 필요`
                );
                return;
              }
            }

            core.info("PR Guard passed.");
